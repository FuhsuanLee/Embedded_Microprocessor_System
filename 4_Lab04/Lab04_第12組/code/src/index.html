<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LED 控制面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border: 1px solid #ddd;
            max-width: 100%;
            width: 100%;
            height: calc(100vh - 40px);
            display: flex;
            flex-direction: column;
        }

        h1 {
            text-align: center;
            color: #333;
            margin: 0;
            padding: 20px;
            font-size: 28px;
            border-bottom: 2px solid #333;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .left-panel {
            flex: 1;
            padding: 30px;
            border-right: 2px solid #333;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .right-panel {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            background: #fafafa;
            overflow-y: auto;
        }

        .panel-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #333;
        }

        .led-controls {
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .led-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: white;
            border: 1px solid #ddd;
        }

        .led-item input[type="checkbox"] {
            width: 25px;
            height: 25px;
            margin-right: 15px;
            cursor: pointer;
        }

        .led-label {
            font-size: 18px;
            color: #333;
            font-weight: bold;
        }

        .status-display {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .status-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: white;
            border: 2px solid #333;
        }

        .status-label {
            font-size: 18px;
            color: #333;
            font-weight: bold;
        }

        .led-status {
            padding: 8px 20px;
            font-size: 16px;
            font-weight: bold;
            border: 2px solid #333;
        }

        .led-status.on {
            background: #333;
            color: #fff;
        }

        .led-status.off {
            background: #fff;
            color: #333;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 20px 30px;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #333;
            background: white;
            color: #333;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: #333;
            color: white;
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .reset-btn:hover {
            background: #666;
            color: white;
            border-color: #666;
        }

        .shine-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #333;
        }

        .shine-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .shine-control {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .shine-control input[type="number"] {
            flex: 1;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #333;
            background: white;
        }

        .shine-btn {
            flex: 1;
            padding: 20px 30px;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #333;
            background: #333;
            color: white;
            cursor: pointer;
        }

        .shine-btn:hover {
            background: white;
            color: #333;
        }

        .shine-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-box {
            background: #fafafa;
            border: 2px solid #333;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .result-box.show {
            display: block;
        }

        .result-box.error {
            border-color: #000;
            background: #eee;
        }

        .result-box.success {
            border-color: #000;
            background: #fff;
        }

        .result-title {
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 18px;
            color: #333;
        }

        .result-item {
            padding: 8px 0;
            font-size: 16px;
            color: #333;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #ddd;
            border-top: 4px solid #333;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LED 控制面板</h1>
        
        <div class="main-content">
            <!-- 左側控制面板 -->
            <div class="left-panel">
                <div class="panel-title">控制面板</div>
                
                <form id="ledForm">
                    <div class="led-controls">
                        <div class="led-item">
                            <input type="checkbox" id="led1" name="led1" value="1">
                            <label for="led1" class="led-label">LED 1</label>
                        </div>
                        
                        <div class="led-item">
                            <input type="checkbox" id="led2" name="led2" value="2">
                            <label for="led2" class="led-label">LED 2</label>
                        </div>
                        
                        <div class="led-item">
                            <input type="checkbox" id="led3" name="led3" value="3">
                            <label for="led3" class="led-label">LED 3</label>
                        </div>
                        
                        <div class="led-item">
                            <input type="checkbox" id="led4" name="led4" value="4">
                            <label for="led4" class="led-label">LED 4</label>
                        </div>
                    </div>

                    <div class="button-group">
                        <button type="button" class="reset-btn" onclick="resetForm()">重置</button>
                        <button type="submit" class="submit-btn">送出控制</button>
                    </div>
                </form>

                <!-- 閃爍功能 -->
                <div class="shine-section">
                    <div class="shine-title">閃爍模式</div>
                    <div class="shine-control">
                        <input type="number" id="shineCount" placeholder="輸入閃爍次數" min="1" value="5">
                        <button type="button" class="shine-btn" onclick="triggerShine()">開始閃爍</button>
                    </div>
                </div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>傳送中...</p>
                </div>
            </div>

            <!-- 右側狀態顯示 -->
            <div class="right-panel">
                <div class="panel-title">控制狀態</div>
                
                <div class="status-display">
                    <div class="status-item">
                        <span class="status-label">LED 1</span>
                        <span class="led-status off" id="status1">關閉</span>
                    </div>
                    
                    <div class="status-item">
                        <span class="status-label">LED 2</span>
                        <span class="led-status off" id="status2">關閉</span>
                    </div>
                    
                    <div class="status-item">
                        <span class="status-label">LED 3</span>
                        <span class="led-status off" id="status3">關閉</span>
                    </div>
                    
                    <div class="status-item">
                        <span class="status-label">LED 4</span>
                        <span class="led-status off" id="status4">關閉</span>
                    </div>
                </div>

                <div class="result-box" id="resultBox">
                    <div class="result-title" id="resultTitle">控制結果：</div>
                    <div id="resultContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('ledForm');
        const resultBox = document.getElementById('resultBox');
        const resultTitle = document.getElementById('resultTitle');
        const resultContent = document.getElementById('resultContent');
        const loading = document.getElementById('loading');

        // 處理表單送出
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 收集 LED 狀態
            const leds = {};
            for (let i = 1; i <= 4; i++) {
                const checkbox = document.getElementById(`led${i}`);
                leds[i.toString()] = checkbox.checked;
            }

            // 顯示載入動畫
            loading.classList.add('show');
            resultBox.classList.remove('show');
            
            // 禁用按鈕
            const submitBtn = form.querySelector('.submit-btn');
            submitBtn.disabled = true;

            try {
                // 送出請求
                const response = await fetch('/api/led', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ leds })
                });

                const data = await response.json();
                
                // 隱藏載入動畫
                loading.classList.remove('show');
                submitBtn.disabled = false;

                if (response.ok) {
                    // 成功
                    showResult(true, leds, data.results);
                    updateStatusDisplay(leds);
                } else {
                    // 錯誤
                    showResult(false, leds, data);
                }
            } catch (error) {
                loading.classList.remove('show');
                submitBtn.disabled = false;
                showResult(false, {}, { error: error.message });
            }
        });

        // 顯示結果
        function showResult(success, leds, results) {
            resultBox.className = 'result-box show ' + (success ? 'success' : 'error');
            resultTitle.textContent = success ? '✅ 控制成功！' : '❌ 控制失敗！';
            
            let html = '<div style="margin-top: 10px;">';
            html += '<strong>送出的狀態：</strong><br>';
            
            for (let i = 1; i <= 4; i++) {
                const status = leds[i.toString()] ? '開啟 (ON)' : '關閉 (OFF)';
                const icon = leds[i.toString()] ? '💡' : '⚫';
                html += `<div class="result-item">${icon} LED ${i}: ${status}</div>`;
            }
            
            if (results.results) {
                html += '<br><strong>執行結果：</strong><br>';
                for (let led in results.results) {
                    const result = results.results[led];
                    const icon = result === 'success' ? '✓' : '✗';
                    html += `<div class="result-item">${icon} LED ${led}: ${result}</div>`;
                }
            } else if (results.error) {
                html += `<br><strong>錯誤訊息：</strong><br>`;
                html += `<div class="result-item" style="color: #d32f2f;">${results.error}</div>`;
            }
            
            html += '</div>';
            resultContent.innerHTML = html;
        }

        // 更新狀態顯示
        function updateStatusDisplay(leds) {
            for (let i = 1; i <= 4; i++) {
                const statusElement = document.getElementById(`status${i}`);
                const isOn = leds[i.toString()];
                
                if (isOn) {
                    statusElement.textContent = '開啟';
                    statusElement.className = 'led-status on';
                } else {
                    statusElement.textContent = '關閉';
                    statusElement.className = 'led-status off';
                }
            }
        }

        // 重置表單
        function resetForm() {
            form.reset();
            resultBox.classList.remove('show');
            
            // 重置所有狀態顯示
            for (let i = 1; i <= 4; i++) {
                const statusElement = document.getElementById(`status${i}`);
                statusElement.textContent = '關閉';
                statusElement.className = 'led-status off';
            }
        }

        // 監聽 checkbox 變化即時更新顯示
        for (let i = 1; i <= 4; i++) {
            document.getElementById(`led${i}`).addEventListener('change', function(e) {
                const statusElement = document.getElementById(`status${i}`);
                if (e.target.checked) {
                    statusElement.textContent = '開啟';
                    statusElement.className = 'led-status on';
                } else {
                    statusElement.textContent = '關閉';
                    statusElement.className = 'led-status off';
                }
            });
        }

        // 閃爍功能
        async function triggerShine() {
            const countInput = document.getElementById('shineCount');
            const counts = parseInt(countInput.value);
            
            if (!counts || counts <= 0) {
                alert('請輸入有效的閃爍次數 (正整數)');
                return;
            }

            // 顯示載入動畫
            loading.classList.add('show');
            resultBox.classList.remove('show');
            
            // 禁用按鈕
            const shineBtn = document.querySelector('.shine-btn');
            const submitBtn = document.querySelector('.submit-btn');
            shineBtn.disabled = true;
            submitBtn.disabled = true;

            try {
                // 送出請求
                const response = await fetch('/api/led/shine', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ counts })
                });

                const data = await response.json();
                
                // 隱藏載入動畫
                loading.classList.remove('show');
                shineBtn.disabled = false;
                submitBtn.disabled = false;

                if (response.ok) {
                    // 成功
                    showShineResult(true, counts, data.result);
                } else {
                    // 錯誤
                    showShineResult(false, counts, data.error);
                }
            } catch (error) {
                loading.classList.remove('show');
                shineBtn.disabled = false;
                submitBtn.disabled = false;
                showShineResult(false, counts, error.message);
            }
        }

        // 顯示閃爍結果
        function showShineResult(success, counts, result) {
            resultBox.className = 'result-box show ' + (success ? 'success' : 'error');
            resultTitle.textContent = success ? '✅ 閃爍模式啟動成功！' : '❌ 閃爍模式失敗！';
            
            let html = '<div style="margin-top: 10px;">';
            html += `<div class="result-item"><strong>閃爍次數：</strong>${counts} 次</div>`;
            html += `<div class="result-item"><strong>執行結果：</strong>${result}</div>`;
            html += '</div>';
            
            resultContent.innerHTML = html;
        }
    </script>
</body>
</html>
